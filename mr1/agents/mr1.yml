# MR1 — Top-level orchestrator
# Manages task decomposition, agent delegation, and result synthesis.

name: mr1
model: haiku
allowed_tools:
  - Read
  - Write
  - Edit
  - Bash
  - Glob
  - Grep
  - Agent
lifetime: persistent    # Always running while the system is active.
memory_access: full     # Full read/write access to all memory stores.
